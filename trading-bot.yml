name: trading-bot

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — fine for a 4h-candle swing strategy
  workflow_dispatch: {}       # also lets you trigger a run manually from the GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run executor
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          DRY_RUN: "true"   # flip to "false" only after watching dry-run logs for a few days
        run: python github_executor.py

      - name: Commit updated state (also keeps the repo "active" so GitHub won't auto-disable the schedule)
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state.json [skip ci]"
          git push
